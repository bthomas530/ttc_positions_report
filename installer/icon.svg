<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#grad)"/>
  <!-- House: roof + body, a door cut through to the gradient -->
  <polygon points="70,148 128,92 186,148" fill="white" opacity="0.95"/>
  <rect x="82" y="148" width="92" height="64" rx="6" fill="white" opacity="0.95"/>
  <rect x="117" y="178" width="22" height="34" rx="2" fill="url(#grad)"/>
  <!-- Growth line, arcing clear over the roofline -->
  <path d="M 50 180 Q 90 40, 210 45" stroke="white" stroke-width="9" fill="none" stroke-linecap="round"/>
  <polygon points="210,45 195,42 198,57" fill="white"/>
</svg>
